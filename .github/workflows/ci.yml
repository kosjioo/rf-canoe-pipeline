name: RF and CANoe CI with Self-Hosted Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Robot Framework tests with numeric timestamp folder
      shell: cmd
      run: |
        rem 获取年月日，格式 YYYYMMDD
        for /f "tokens=2 delims==." %%i in ('wmic os get LocalDateTime /value ^| find "="') do set dt=%%i
        set YYYY=%dt:~0,4%
        set MM=%dt:~4,2%
        set DD=%dt:~6,2%
        set HH=%dt:~8,2%
        set Min=%dt:~10,2%
        set Sec=%dt:~12,2%

        set TIMESTAMP=%YYYY%%MM%%DD%_%HH%%Min%%Sec%

        mkdir run_%TIMESTAMP%
        robot -d run_%TIMESTAMP% HLK.robot > run_%TIMESTAMP%\run.log 2>&1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          run_*/output.xml
          run_*/log.html
          run_*/report.html
          run_*/run.log
